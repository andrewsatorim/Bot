<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Код 1847 — Частный чайный клуб · Арбат</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Bodoni+Moda:wght@400;500&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#B89860;--ink:#08080A;--stone:#9A958B;--linen:#F5F0E8;
  --gold-light:#F5EFDF;--gold-mid:#E8D9B8;
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Raleway',sans-serif;font-size:14px;line-height:2;color:#fff;background:var(--ink);overflow-x:hidden}
::selection{background:rgba(184,152,96,.3)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* Preloader */
.preloader{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--ink);transition:opacity .6s ease,visibility .6s ease}
.preloader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.preloader-logo{font-family:'Bodoni Moda',serif;font-size:36px;color:var(--gold);letter-spacing:.15em;opacity:0;transform:scale(.8);animation:logoIn .8s cubic-bezier(.16,1,.3,1) forwards}
@keyframes logoIn{to{opacity:1;transform:scale(1)}}

/* Header */
header{position:fixed;top:0;left:0;right:0;z-index:50;transition:background .5s ease}
header.scrolled{background:rgba(8,8,10,.95);backdrop-filter:blur(4px)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:72px}
.logo{font-family:'Bodoni Moda',serif;font-size:18px;letter-spacing:.15em;color:#fff;text-decoration:none}
.nav{display:flex;align-items:center;gap:32px}
.nav a{font-family:'Raleway',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.7);text-decoration:none;transition:color .3s}
.nav a:hover{color:var(--gold)}
.lang-toggle{font-family:'Raleway',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.5);cursor:pointer;background:none;border:none}
.lang-toggle .active{color:#fff}
.lang-sep{color:rgba(184,152,96,.3);margin:0 4px}
.btn-reserve{display:inline-block;padding:8px 24px;border:1px solid var(--gold);color:var(--gold);font-family:'Raleway',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.2em;text-decoration:none;transition:all .2s}
.btn-reserve:hover{background:var(--gold);color:var(--ink);transform:translateY(-1px)}

/* Burger */
.burger{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer;background:none;border:none}
.burger span{display:block;width:24px;height:1px;background:#fff;transition:all .3s}
.burger.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

/* Mobile overlay */
.mobile-menu{position:fixed;inset:0;z-index:40;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;opacity:0;visibility:hidden;transition:all .5s}
.mobile-menu.open{opacity:1;visibility:visible}
.mobile-menu a{font-family:'Cormorant Garamond',serif;font-size:28px;color:#fff;text-decoration:none;transition:color .3s}
.mobile-menu a:hover{color:var(--gold)}

/* Hero */
.hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(to bottom,var(--ink),#0a0a0c,var(--ink))}
.hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(184,152,96,.06),transparent 70%)}

/* Particles */
.particle{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(184,152,96,.15);pointer-events:none}
@keyframes float{
  0%,100%{transform:translateY(0) scale(1);opacity:.3}
  50%{transform:translateY(-100px) scale(1.5);opacity:.08}
}

/* Hero content */
.hero-content{position:relative;z-index:10;text-align:center;padding:0 24px;max-width:720px}
.hero-subtitle{font-family:'Raleway',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:.3em;color:var(--gold);margin-bottom:24px;opacity:0;transform:translateY(32px)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;line-height:1.15;color:#fff;margin-bottom:24px;opacity:0;transform:translateY(32px)}
.hero-title em{font-style:italic}
.hero-divider{width:48px;height:1px;background:var(--gold);margin:0 auto 32px;opacity:0;transform:translateY(32px)}
.hero-cta{opacity:0;transform:translateY(32px)}
.hero-cta a{display:inline-block;padding:12px 40px;border:1px solid var(--gold);color:var(--gold);font-family:'Raleway',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.25em;text-decoration:none;transition:all .2s}
.hero-cta a:hover{background:var(--gold);color:var(--ink);transform:translateY(-1px)}

/* Scroll indicator */
.scroll-indicator{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0}
.scroll-indicator span{font-family:'Raleway',sans-serif;font-size:8px;text-transform:uppercase;letter-spacing:.3em;color:rgba(154,149,139,.5)}
.scroll-indicator .line{width:1px;height:32px;background:linear-gradient(to bottom,rgba(184,152,96,.4),transparent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Animate in */
.animate-in{animation:fadeUp 1.1s cubic-bezier(.16,1,.3,1) forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* Desktop */
@media(min-width:1024px){
  .hero-title{font-size:64px}
}

/* Mobile */
@media(max-width:767px){
  .nav{display:none}
  .burger{display:flex}
  .hero-title{font-size:36px}
}
@media(min-width:768px) and (max-width:1023px){
  .hero-title{font-size:48px}
}
</style>
</head>
<body>

<!-- Preloader -->
<div class="preloader" id="preloader">
  <div class="preloader-logo">К·18/47</div>
</div>

<!-- Header -->
<header id="header">
  <div class="header-inner">
    <a href="/" class="logo">К·18/47</a>
    <nav class="nav">
      <a href="#zones" data-i18n="nav-tea">Чайный зал</a>
      <a href="#gallery" data-i18n="nav-lib">Библиотека</a>
      <a href="#contacts" data-i18n="nav-ward">Гардероб</a>
      <button class="lang-toggle" id="langToggle">
        <span class="active" id="langRu">RU</span><span class="lang-sep">|</span><span id="langEn">EN</span>
      </button>
      <a href="#booking" class="btn-reserve" data-i18n="nav-reserve">Резерв</a>
    </nav>
    <button class="burger" id="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- Mobile menu -->
<div class="mobile-menu" id="mobileMenu">
  <a href="#zones" onclick="closeMobile()" data-i18n="nav-tea">Чайный зал</a>
  <a href="#gallery" onclick="closeMobile()" data-i18n="nav-lib">Библиотека</a>
  <a href="#contacts" onclick="closeMobile()" data-i18n="nav-ward">Гардероб</a>
  <div style="width:48px;height:1px;background:var(--gold);margin:8px 0"></div>
  <button class="lang-toggle" onclick="toggleLang()" style="font-size:14px">
    <span id="langRu2" class="active">RU</span><span class="lang-sep">|</span><span id="langEn2">EN</span>
  </button>
  <a href="#booking" onclick="closeMobile()" class="btn-reserve" data-i18n="nav-reserve">Резерв</a>
</div>

<!-- Hero -->
<section class="hero" id="hero">
  <div class="hero-bg"></div>
  <div class="hero-glow"></div>

  <!-- Particles -->
  <div class="particle" style="left:12%;bottom:15%;animation:float 6s ease-in-out infinite"></div>
  <div class="particle" style="left:28%;bottom:20%;animation:float 7.5s ease-in-out infinite .8s"></div>
  <div class="particle" style="left:44%;bottom:25%;animation:float 9s ease-in-out infinite 1.6s"></div>
  <div class="particle" style="left:60%;bottom:18%;animation:float 6.5s ease-in-out infinite 2.4s"></div>
  <div class="particle" style="left:76%;bottom:22%;animation:float 8s ease-in-out infinite 3.2s"></div>
  <div class="particle" style="left:88%;bottom:12%;animation:float 7s ease-in-out infinite 4s"></div>

  <div class="hero-content">
    <p class="hero-subtitle" id="heroSub" data-i18n="hero-sub">ЧАСТНЫЙ ЧАЙНЫЙ КЛУБ · АРБАТ</p>
    <h1 class="hero-title" id="heroTitle">
      <span data-i18n="hero-t1">Пространство доверия</span> <em data-i18n="hero-t2">и смысла</em>
    </h1>
    <div class="hero-divider" id="heroDiv"></div>
    <div class="hero-cta" id="heroCta">
      <a href="#booking" data-i18n="hero-cta">РЕЗЕРВ</a>
    </div>
  </div>

  <div class="scroll-indicator" id="scrollInd">
    <span data-i18n="hero-scroll">Листайте вниз</span>
    <div class="line"></div>
  </div>
</section>

<script>
// Translations
const i18n = {
  ru: {
    'nav-tea':'Чайный зал','nav-lib':'Библиотека','nav-ward':'Гардероб','nav-reserve':'Резерв',
    'hero-sub':'ЧАСТНЫЙ ЧАЙНЫЙ КЛУБ · АРБАТ','hero-t1':'Пространство доверия','hero-t2':'и смысла',
    'hero-cta':'РЕЗЕРВ','hero-scroll':'Листайте вниз'
  },
  en: {
    'nav-tea':'Tea Hall','nav-lib':'Library','nav-ward':'Wardrobe','nav-reserve':'Reserve',
    'hero-sub':'PRIVATE TEA CLUB · ARBAT','hero-t1':'A space of trust','hero-t2':'and meaning',
    'hero-cta':'RESERVE','hero-scroll':'Scroll down'
  }
};
let lang = 'ru';

function setLang(l) {
  lang = l;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[l][key]) el.textContent = i18n[l][key];
  });
  document.getElementById('langRu').className = l==='ru'?'active':'';
  document.getElementById('langEn').className = l==='en'?'active':'';
  if(document.getElementById('langRu2')){
    document.getElementById('langRu2').className = l==='ru'?'active':'';
    document.getElementById('langEn2').className = l==='en'?'active':'';
  }
}

function toggleLang() { setLang(lang==='ru'?'en':'ru'); }
document.getElementById('langToggle').addEventListener('click', toggleLang);

// Preloader
setTimeout(() => document.getElementById('preloader').classList.add('hidden'), 800);

// Header scroll
window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
}, {passive:true});

// Hero cascade animation
setTimeout(() => {
  const delays = [900, 1050, 1200, 1350, 1500];
  ['heroSub','heroTitle','heroDiv','heroCta','scrollInd'].forEach((id,i) => {
    setTimeout(() => document.getElementById(id).classList.add('animate-in'), delays[i]);
  });
}, 0);

// Burger
const burger = document.getElementById('burger');
const mobileMenu = document.getElementById('mobileMenu');
burger.addEventListener('click', () => {
  burger.classList.toggle('open');
  mobileMenu.classList.toggle('open');
  document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
});
function closeMobile() {
  burger.classList.remove('open');
  mobileMenu.classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
