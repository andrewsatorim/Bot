<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Код 1847 — Частный чайный клуб · Арбат</title>
<meta name="description" content="Частный чайный клуб на Арбате. Пространство доверия и смысла.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#B89860;--ink:#08080A;--stone:#9A958B;--linen:#F5F0E8;--gold-light:#F5EFDF}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Raleway',sans-serif;font-size:14px;line-height:2;color:#fff;background:var(--ink);overflow-x:hidden}
::selection{background:rgba(184,152,96,.3)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* === PRELOADER === */
.preloader{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--ink);transition:opacity .8s cubic-bezier(.4,0,.2,1),visibility .8s}
.preloader.fade-out{opacity:0;visibility:hidden;pointer-events:none}
.preloader-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.preloader-logo{width:240px;height:240px}

/* Stroke draw animation */
.draw{fill:none;stroke:#B89860;stroke-dasharray:700;stroke-dashoffset:700}
.draw-outer{stroke-width:1;animation:draw 2.5s cubic-bezier(.4,0,.2,1) .2s forwards}
.draw-inner{stroke-width:.5;opacity:.3;animation:draw 2.2s cubic-bezier(.4,0,.2,1) .6s forwards}
.draw-diamond{stroke-width:1.2;animation:draw 1.5s cubic-bezier(.4,0,.2,1) 1.2s forwards}
.draw-k1{stroke-width:2.2;animation:draw 1.8s cubic-bezier(.4,0,.2,1) 1.6s forwards}
.draw-k2{stroke-width:2.2;animation:draw 1.5s cubic-bezier(.4,0,.2,1) 2s forwards}
.draw-k3{stroke-width:2.2;animation:draw 1.5s cubic-bezier(.4,0,.2,1) 2.3s forwards}
.draw-sep{stroke-width:.5;opacity:.25;animation:draw 1.2s cubic-bezier(.4,0,.2,1) 2.6s forwards}
.draw-num{stroke-width:0;fill:#B89860;opacity:0;animation:fadeIn 1.2s cubic-bezier(.4,0,.2,1) 3s forwards}

@keyframes draw{to{stroke-dashoffset:0}}
@keyframes fadeIn{to{opacity:1}}

@keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* === HEADER === */
header{position:fixed;top:0;left:0;right:0;z-index:50;transition:background .5s}
header.scrolled{background:rgba(8,8,10,.95);backdrop-filter:blur(4px)}
.hdr{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:center;height:72px}
.nav{display:flex;align-items:center;gap:28px}
.nav a,.lang-btn{font-family:'Raleway',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.2em;text-decoration:none;transition:color .3s}
.nav a{color:rgba(255,255,255,.7)}.nav a:hover{color:var(--gold)}
.lang-btn{color:rgba(255,255,255,.5);cursor:pointer;background:none;border:none}
.lang-btn .on{color:#fff}
.lang-sep{color:rgba(184,152,96,.3);margin:0 3px}
.btn-res{display:inline-block;padding:8px 22px;border:1px solid var(--gold);color:var(--gold);font-family:'Raleway',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.2em;text-decoration:none;transition:all .2s}
.btn-res:hover{background:var(--gold);color:var(--ink);transform:translateY(-1px)}
.burger{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer;background:none;border:none}
.burger span{display:block;width:24px;height:1px;background:#fff;transition:all .3s}
.burger.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}
.mob-menu{position:fixed;inset:0;z-index:40;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;opacity:0;visibility:hidden;transition:all .5s}
.mob-menu.open{opacity:1;visibility:visible}
.mob-menu a{font-family:'Cormorant Garamond',serif;font-size:28px;color:#fff;text-decoration:none;transition:color .3s}
.mob-menu a:hover{color:var(--gold)}

/* === HERO === */
.hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(to bottom,var(--ink),#0a0a0c,var(--ink))}
.hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(184,152,96,.06),transparent 70%)}
.ptc{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(184,152,96,.15);pointer-events:none}
@keyframes fl{0%,100%{transform:translateY(0) scale(1);opacity:.3}50%{transform:translateY(-100px) scale(1.5);opacity:.08}}
.hero-c{position:relative;z-index:10;text-align:center;padding:0 24px;max-width:720px}
.hero-logo{margin-bottom:48px;opacity:0;transform:translateY(32px)}
.hero-sub{font-family:'Raleway',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:.3em;color:var(--stone);margin-bottom:24px;opacity:0;transform:translateY(32px)}
.hero-h1{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;line-height:1.15;color:#fff;margin-bottom:24px;opacity:0;transform:translateY(32px)}
.hero-h1 em{font-style:italic}
.hero-line{width:48px;height:1px;background:var(--gold);margin:0 auto 32px;opacity:0;transform:translateY(32px)}
.hero-btn{opacity:0;transform:translateY(32px)}
.hero-btn a{display:inline-block;padding:12px 40px;border:1px solid var(--gold);color:var(--gold);font-family:'Raleway',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.25em;text-decoration:none;transition:all .2s}
.hero-btn a:hover{background:var(--gold);color:var(--ink);transform:translateY(-1px)}
.scroll-i{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0}
.scroll-i span{font-family:'Raleway',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:.4em;color:rgba(154,149,139,.4)}
.scroll-i .ln{width:1px;height:40px;background:linear-gradient(to bottom,rgba(184,152,96,.4),transparent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.anim{animation:fu 1.1s cubic-bezier(.16,1,.3,1) forwards}
@keyframes fu{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:1024px){.hero-h1{font-size:64px}}
@media(max-width:767px){.nav{display:none}.burger{display:flex}.preloader-logo{width:180px;height:180px}}
</style>
</head>
<body>

<!-- PRELOADER — logo draws in, then stays visible on hero -->
<div class="preloader" id="pre">
<div class="preloader-wrap">
<svg class="preloader-logo" viewBox="-2 -2 164 164" xmlns="http://www.w3.org/2000/svg">
  <rect class="draw draw-outer" x="0" y="0" width="160" height="160"/>
  <rect class="draw draw-inner" x="10" y="10" width="140" height="140"/>
  <path class="draw draw-diamond" d="M80 18 L87 25 L80 32 L73 25 Z"/>
  <line class="draw draw-k1" x1="42" y1="52" x2="42" y2="112"/>
  <line class="draw draw-k2" x1="42" y1="82" x2="70" y2="52"/>
  <line class="draw draw-k3" x1="42" y1="82" x2="70" y2="112"/>
  <line class="draw draw-sep" x1="84" y1="55" x2="84" y2="109"/>
  <text class="draw-num" x="96" y="78" font-family="'Bodoni Moda',Georgia,serif" font-size="23" fill="#B89860" letter-spacing="2">18</text>
  <text class="draw-num" x="96" y="105" font-family="'Bodoni Moda',Georgia,serif" font-size="23" fill="#B89860" letter-spacing="2">47</text>
</svg>
</div>
</div>

<!-- HEADER — no logo, nav centered -->
<header id="hdr">
<div class="hdr">
  <nav class="nav">
    <a href="#about" data-t="nav-about">О клубе</a>
    <a href="#zones" data-t="nav-zones">Зоны</a>
    <a href="#menu" data-t="nav-menu">Меню</a>
    <a href="#events" data-t="nav-events">Мероприятия</a>
    <a href="#gallery" data-t="nav-gallery">Галерея</a>
    <a href="#contacts" data-t="nav-contacts">Контакты</a>
    <button class="lang-btn" id="lBtn"><span class="on" id="lR">RU</span><span class="lang-sep">|</span><span id="lE">EN</span></button>
    <a href="#booking" class="btn-res" data-t="nav-res">РЕЗЕРВ</a>
  </nav>
  <button class="burger" id="burg" aria-label="Menu"><span></span><span></span><span></span></button>
</div>
</header>

<!-- MOBILE MENU -->
<div class="mob-menu" id="mobM">
<a href="#about" onclick="cM()" data-t="nav-about">О клубе</a>
<a href="#zones" onclick="cM()" data-t="nav-zones">Зоны</a>
<a href="#menu" onclick="cM()" data-t="nav-menu">Меню</a>
<a href="#events" onclick="cM()" data-t="nav-events">Мероприятия</a>
<a href="#gallery" onclick="cM()" data-t="nav-gallery">Галерея</a>
<a href="#contacts" onclick="cM()" data-t="nav-contacts">Контакты</a>
<div style="width:48px;height:1px;background:var(--gold);margin:8px 0"></div>
<button class="lang-btn" onclick="tL()" style="font-size:14px"><span id="lR2" class="on">RU</span><span class="lang-sep">|</span><span id="lE2">EN</span></button>
<a href="#booking" onclick="cM()" class="btn-res" data-t="nav-res">РЕЗЕРВ</a>
</div>

<!-- HERO -->
<section class="hero">
<div class="hero-bg"></div>
<div class="hero-glow"></div>
<div class="ptc" style="left:12%;bottom:15%;animation:fl 6s ease-in-out infinite"></div>
<div class="ptc" style="left:28%;bottom:20%;animation:fl 7.5s ease-in-out infinite .8s"></div>
<div class="ptc" style="left:44%;bottom:25%;animation:fl 9s ease-in-out infinite 1.6s"></div>
<div class="ptc" style="left:60%;bottom:18%;animation:fl 6.5s ease-in-out infinite 2.4s"></div>
<div class="ptc" style="left:76%;bottom:22%;animation:fl 8s ease-in-out infinite 3.2s"></div>
<div class="ptc" style="left:88%;bottom:12%;animation:fl 7s ease-in-out infinite 4s"></div>
<div class="hero-c">
  <!-- Static logo in hero — large -->
  <div class="hero-logo" id="hLogo">
    <svg width="200" height="200" viewBox="-2 -2 164 164" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="160" height="160" fill="none" stroke="#B89860" stroke-width="1"/>
      <rect x="10" y="10" width="140" height="140" fill="none" stroke="#B89860" stroke-width=".5" opacity=".3"/>
      <path d="M80 18 L87 25 L80 32 L73 25 Z" fill="#B89860" opacity=".55"/>
      <line x1="42" y1="52" x2="42" y2="112" stroke="#B89860" stroke-width="2.2"/>
      <line x1="42" y1="82" x2="70" y2="52" stroke="#B89860" stroke-width="2.2"/>
      <line x1="42" y1="82" x2="70" y2="112" stroke="#B89860" stroke-width="2.2"/>
      <line x1="84" y1="55" x2="84" y2="109" stroke="#B89860" stroke-width=".5" opacity=".25"/>
      <text x="112" y="78" font-family="'Bodoni Moda',Georgia,serif" font-size="28" fill="#B89860" letter-spacing="3" text-anchor="middle">18</text>
      <text x="112" y="108" font-family="'Bodoni Moda',Georgia,serif" font-size="28" fill="#B89860" letter-spacing="3" text-anchor="middle">47</text>
    </svg>
  </div>
  <div class="hero-btn" id="hB"><a href="#booking" data-t="hero-cta">РЕЗЕРВ</a></div>
</div>
<div class="scroll-i" id="sI"><span data-t="hero-sc">ЛИСТАЙТЕ</span><div class="ln"></div></div>
</section>

<script>
var T={ru:{'nav-about':'О клубе','nav-zones':'Зоны','nav-menu':'Меню','nav-events':'Мероприятия','nav-gallery':'Галерея','nav-contacts':'Контакты','nav-res':'РЕЗЕРВ','hero-sub':'ЧАСТНЫЙ ЧАЙНЫЙ КЛУБ · АРБАТ, МОСКВА','hero-t1':'Пространство доверия','hero-t2':'и смысла','hero-cta':'РЕЗЕРВ','hero-sc':'ЛИСТАЙТЕ'},en:{'nav-about':'About','nav-zones':'Zones','nav-menu':'Menu','nav-events':'Events','nav-gallery':'Gallery','nav-contacts':'Contacts','nav-res':'RESERVE','hero-sub':'PRIVATE TEA CLUB · ARBAT, MOSCOW','hero-t1':'A space of trust','hero-t2':'and meaning','hero-cta':'RESERVE','hero-sc':'SCROLL'}},L='ru';
function sL(l){L=l;document.querySelectorAll('[data-t]').forEach(function(e){var k=e.getAttribute('data-t');if(T[l][k])e.textContent=T[l][k]});['lR','lE','lR2','lE2'].forEach(function(id){var e=document.getElementById(id);if(e)e.className=id.indexOf('R')>-1?(l==='ru'?'on':''):(l==='en'?'on':'')});}
function tL(){sL(L==='ru'?'en':'ru')}
document.getElementById('lBtn').addEventListener('click',tL);
setTimeout(function(){document.getElementById('pre').classList.add('fade-out')},4800);
window.addEventListener('scroll',function(){document.getElementById('hdr').classList.toggle('scrolled',window.scrollY>50)},{passive:true});
['hLogo','hB','sI'].forEach(function(id,i){setTimeout(function(){document.getElementById(id).classList.add('anim')},5000+i*200)});
var bg=document.getElementById('burg'),mm=document.getElementById('mobM');
bg.addEventListener('click',function(){bg.classList.toggle('open');mm.classList.toggle('open');document.body.style.overflow=mm.classList.contains('open')?'hidden':''});
function cM(){bg.classList.remove('open');mm.classList.remove('open');document.body.style.overflow=''}
</script>
</body>
</html>
